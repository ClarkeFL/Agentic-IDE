name: AgenticIDE
options:
  bundleIdPrefix: com.fabio
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES

targets:
  AgenticIDE:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: AgenticIDE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fabio.AgenticIDE
        PRODUCT_NAME: AgenticIDE
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        SWIFT_VERSION: "5.10"
        CLANG_CXX_LIBRARY: "libc++"
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - "Cocoa"
          - "-framework"
          - "QuartzCore"
          - "-framework"
          - "Metal"
          - "-framework"
          - "MetalKit"
          - "-framework"
          - "IOSurface"
    dependencies:
      - framework: Vendor/GhosttyKit.xcframework
        embed: false
    preBuildScripts:
      - name: Fetch GhosttyKit
        script: '"${SRCROOT}/Scripts/fetch-ghosttykit.sh"'
        inputFiles:
          - $(SRCROOT)/Scripts/ghosttykit-checksums.txt
        outputFiles:
          - $(DERIVED_FILE_DIR)/ghosttykit-fetched.stamp
        basedOnDependencyAnalysis: false
