name: AgenticIDE
options:
  bundleIdPrefix: com.fabio
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES

targets:
  AgenticIDE:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: AgenticIDE
    # Use an explicit generated Info.plist instead of GENERATE_INFOPLIST_FILE
    # because Xcode silently drops INFOPLIST_KEY_* settings whose key isn't on
    # its built-in recognized-keys list — that hid SUFeedURL / SUPublicEDKey
    # from Sparkle and broke "Check for Updates".
    info:
      path: Generated/Info.plist
      properties:
        # XcodeGen hardcodes CFBundleShortVersionString/CFBundleVersion to "1.0"/"1"
        # unless they're listed here. Use build-setting substitutions so the
        # MARKETING_VERSION/CURRENT_PROJECT_VERSION pair flows through to the
        # About box and the appcast.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        SUFeedURL: https://raw.githubusercontent.com/ClarkeFL/Agentic-IDE/main/appcast.xml
        SUEnableAutomaticChecks: true
        SUPublicEDKey: iNkqfiKbf44ySMxWHYdroNzuxe0T6SKyi/CkkqWpzYo=
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fabio.AgenticIDE
        PRODUCT_NAME: AgenticIDE
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        SWIFT_VERSION: "5.10"
        CLANG_CXX_LIBRARY: "libc++"
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - "Cocoa"
          - "-framework"
          - "QuartzCore"
          - "-framework"
          - "Metal"
          - "-framework"
          - "MetalKit"
          - "-framework"
          - "IOSurface"
    dependencies:
      - framework: Vendor/GhosttyKit.xcframework
        embed: false
      - package: Sparkle
        product: Sparkle
    preBuildScripts:
      - name: Fetch GhosttyKit
        script: '"${SRCROOT}/Scripts/fetch-ghosttykit.sh"'
        inputFiles:
          - $(SRCROOT)/Scripts/ghosttykit-checksums.txt
        outputFiles:
          - $(DERIVED_FILE_DIR)/ghosttykit-fetched.stamp
        basedOnDependencyAnalysis: false
