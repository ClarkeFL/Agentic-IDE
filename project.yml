name: AgenticIDE
options:
  bundleIdPrefix: com.fabio
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.5"
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES

targets:
  AgenticIDE:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: AgenticIDE
    # Use an explicit generated Info.plist instead of GENERATE_INFOPLIST_FILE
    # because Xcode silently drops INFOPLIST_KEY_* settings whose key isn't on
    # its built-in recognized-keys list — that hid SUFeedURL / SUPublicEDKey
    # from Sparkle and broke "Check for Updates".
    info:
      path: Generated/Info.plist
      properties:
        # XcodeGen hardcodes CFBundleShortVersionString/CFBundleVersion to "1.0"/"1"
        # unless they're listed here. Use build-setting substitutions so the
        # MARKETING_VERSION/CURRENT_PROJECT_VERSION pair flows through to the
        # About box and the appcast.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        SUFeedURL: https://raw.githubusercontent.com/ClarkeFL/Agentic-IDE/main/appcast.xml
        SUEnableAutomaticChecks: true
        SUPublicEDKey: iNkqfiKbf44ySMxWHYdroNzuxe0T6SKyi/CkkqWpzYo=
        # TCC usage strings. Without these the Documents/Downloads/Desktop
        # prompts show macOS' generic "would like to access" copy and (worse)
        # don't reliably persist consent — they re-fire every time the
        # terminal child process (Claude Code, etc.) reads or writes a file
        # in those locations. Hardened runtime is on (line 59), so these
        # keys are required to bridge from the system-default deny.
        NSDocumentsFolderUsageDescription: AgenticIDE needs access to your Documents folder to open and edit projects you keep there.
        NSDownloadsFolderUsageDescription: AgenticIDE needs access to your Downloads folder so the terminal and editor can read files you've downloaded.
        NSDesktopFolderUsageDescription: AgenticIDE needs access to your Desktop so projects and scratch files stored there are visible.
        # AppleScript / cross-app automation gets used when the terminal asks
        # macOS to open URLs, reveal files in Finder, etc.
        NSAppleEventsUsageDescription: AgenticIDE uses Apple Events to open URLs, files, and folders in other apps when you click on them.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fabio.AgenticIDE
        PRODUCT_NAME: AgenticIDE
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Manual signing across both configs. Debug uses the local
        # self-signed "AgenticIDE Dev" identity (created by
        # Scripts/create-dev-signing-cert.sh) so the cdhash is anchored to
        # a stable cert and TCC permissions persist across rebuilds.
        # Release defaults to ad-hoc (`-`) here for local builds, but the
        # GitHub Actions tag-push workflow overrides this on the
        # xcodebuild command line with CODE_SIGN_IDENTITY="AgenticIDE
        # Release" — a separate self-signed cert imported from the
        # RELEASE_CERT_P12_BASE64 repo secret. That gives shipped builds a
        # stable Designated Requirement so Sparkle updates don't reset
        # users' TCC grants. Cert generator: Scripts/create-release-signing-cert.sh
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        # Disable library validation in both Debug and Release. Debug needs
        # this so the main binary (signed "AgenticIDE Dev") can load the
        # Xcode-generated debug helper dylib (ad-hoc). Release needs it so
        # the main binary (signed "AgenticIDE Release", empty Team ID
        # because the cert is self-signed) can load Sparkle.framework's
        # internals — the SPM-distributed Sparkle xcframework has a
        # non-empty Team ID baked in, and without this entitlement dyld
        # rejects the load with "different Team IDs" at launch.
        CODE_SIGN_ENTITLEMENTS: AgenticIDE/AgenticIDE.entitlements
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        SWIFT_VERSION: "5.10"
        CLANG_CXX_LIBRARY: "libc++"
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - "Cocoa"
          - "-framework"
          - "QuartzCore"
          - "-framework"
          - "Metal"
          - "-framework"
          - "MetalKit"
          - "-framework"
          - "IOSurface"
      configs:
        Debug:
          # Stable identity for local dev — keeps TCC grants (Full Disk
          # Access, Documents, etc) alive across rebuilds. Run
          # `Scripts/create-dev-signing-cert.sh` once before first build.
          CODE_SIGN_IDENTITY: "AgenticIDE Dev"
        Release:
          # Local Release builds stay ad-hoc; CI overrides this to
          # "AgenticIDE Release" via xcodebuild flags after importing the
          # cert from RELEASE_CERT_P12_BASE64. See .github/workflows/release.yml.
          CODE_SIGN_IDENTITY: "-"
    dependencies:
      - framework: Vendor/GhosttyKit.xcframework
        embed: false
      - package: Sparkle
        product: Sparkle
    preBuildScripts:
      - name: Fetch GhosttyKit
        script: '"${SRCROOT}/Scripts/fetch-ghosttykit.sh"'
        inputFiles:
          - $(SRCROOT)/Scripts/ghosttykit-checksums.txt
        outputFiles:
          - $(DERIVED_FILE_DIR)/ghosttykit-fetched.stamp
        basedOnDependencyAnalysis: false
