name: Release

# Trigger: push a tag like `v0.2.0`. The job builds Release, packages a
# self-signed `.zip`, signs the update with Sparkle's Ed25519 key (from
# `SPARKLE_PRIVATE_KEY`), creates a GitHub Release, and updates `appcast.xml`
# on the default branch so installed copies of the app see the new version.
#
# One-time setup expected:
#   - Repo secret `SPARKLE_PRIVATE_KEY`: base64 Ed25519 key from Sparkle's
#     `generate_keys` tool. Public key is embedded in the app via
#     `INFOPLIST_KEY_SUPublicEDKey` (set in `project.yml`).
#   - Repo secret `RELEASE_CERT_P12_BASE64`: base64-encoded PKCS#12
#     containing the self-signed "AgenticIDE Release" code-signing
#     identity. Generate with `Scripts/create-release-signing-cert.sh`.
#     Signing with a stable cert anchors macOS TCC permissions to the cert
#     instead of the per-build cdhash, so Full Disk Access / Documents /
#     etc. persist across Sparkle updates.
#   - `SUFeedURL` in build settings pointing at the appcast URL on this repo.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    # macos-15 ships Xcode 16, which can open the objectVersion=77 pbxproj
    # XcodeGen produces. Older runners can't read it.
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can push appcast.xml back to the default
          # branch via the same workflow run.
          fetch-depth: 0

      - name: Select Xcode
        # macos-14 ships several Xcodes; pick whichever exists. 16 → 15.4 → default.
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_15.4.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Read version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Strip leading 'v'.
          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import release signing cert
        env:
          RELEASE_CERT_P12_BASE64: ${{ secrets.RELEASE_CERT_P12_BASE64 }}
        run: |
          if [ -z "$RELEASE_CERT_P12_BASE64" ]; then
            echo "::error::RELEASE_CERT_P12_BASE64 secret is not set — generate one with Scripts/create-release-signing-cert.sh"
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          P12_PATH="$RUNNER_TEMP/release.p12"
          P12_PASSWORD=release
          CERT_PEM="$RUNNER_TEMP/release-cert.pem"

          printf '%s' "$RELEASE_CERT_P12_BASE64" | base64 --decode > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend the new keychain to the user search list so codesign finds it.
          EXISTING=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          security import "$P12_PATH" -P "$P12_PASSWORD" -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign

          # Self-signed certs aren't trusted for code signing by default.
          # Pull the cert out of the freshly-imported keychain via `security`
          # rather than openssl — macos-15 ships LibreSSL, which doesn't
          # accept `-legacy` and so can't read the .p12 we generated with
          # OpenSSL 3's legacy PBE. User-level trust on the new keychain
          # doesn't require admin auth.
          security find-certificate -c "AgenticIDE Release" -p "$KEYCHAIN_PATH" > "$CERT_PEM"
          security add-trusted-cert -k "$KEYCHAIN_PATH" -p codeSign "$CERT_PEM"

          # Allow codesign + security to use the private key without a UI prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$P12_PATH" "$CERT_PEM"

          echo "Identities visible to codesign in the new keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Fetch GhosttyKit
        # Vendor/GhosttyKit.xcframework is gitignored — Xcode's prebuild script
        # would fetch it, but xcodebuild needs the framework to exist before
        # it builds the dependency graph. Run the fetch up front.
        run: ./Scripts/fetch-ghosttykit.sh

      - name: Resolve SPM packages
        run: xcodebuild -project AgenticIDE.xcodeproj -scheme AgenticIDE -resolvePackageDependencies

      - name: Build & archive
        run: |
          xcodebuild \
            -project AgenticIDE.xcodeproj \
            -scheme AgenticIDE \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath build/AgenticIDE.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="AgenticIDE Release" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            MARKETING_VERSION=${{ steps.version.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export .app from archive
        run: |
          mkdir -p build/Export
          cp -R build/AgenticIDE.xcarchive/Products/Applications/AgenticIDE.app build/Export/

      - name: Verify signature
        # Sanity check — fails fast if the cert wasn't actually used. The
        # codesign output should show "Authority=AgenticIDE Release" and
        # "Sealed Resources" present. With hardened runtime and the
        # entitlements from project.yml, the binary's Designated Requirement
        # anchors to the release cert, which is what TCC keys against.
        run: |
          codesign --display --verbose=4 build/Export/AgenticIDE.app 2>&1 | head -40
          codesign --verify --strict --deep --verbose=2 build/Export/AgenticIDE.app

      - name: Package as zip
        run: |
          cd build/Export
          ditto -c -k --sequesterRsrc --keepParent AgenticIDE.app ../AgenticIDE-${{ steps.version.outputs.version }}.zip

      - name: Locate Sparkle tools
        id: sparkle
        run: |
          DERIVED=$(xcodebuild -project AgenticIDE.xcodeproj -scheme AgenticIDE -showBuildSettings 2>/dev/null | awk -F'= ' '/ BUILD_DIR /{print $2}' | head -1)
          # Sparkle CLI tools live next to the framework after the package
          # has been resolved + a build has been done.
          SPARKLE_TOOLS=$(find ~/Library/Developer/Xcode/DerivedData -type d -name 'Sparkle' -path '*Sparkle.xcframework*' 2>/dev/null | head -1)
          # Fall back to the artifacts cache that SPM puts the prebuilt tools in.
          SIGN_TOOL=$(find ~/Library/Developer/Xcode/DerivedData -name sign_update -type f 2>/dev/null | head -1)
          GENERATE_TOOL=$(find ~/Library/Developer/Xcode/DerivedData -name generate_appcast -type f 2>/dev/null | head -1)
          echo "sign_update=$SIGN_TOOL" >> "$GITHUB_OUTPUT"
          echo "generate_appcast=$GENERATE_TOOL" >> "$GITHUB_OUTPUT"

      - name: Sign the update
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::warning::SPARKLE_PRIVATE_KEY secret not set — appcast will be unsigned"
            echo "signature=" >> "$GITHUB_OUTPUT"
            echo "length=$(stat -f%z build/AgenticIDE-${{ steps.version.outputs.version }}.zip)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEY_FILE="$RUNNER_TEMP/sparkle_ed25519.key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          OUTPUT=$("${{ steps.sparkle.outputs.sign_update }}" -f "$KEY_FILE" "build/AgenticIDE-${{ steps.version.outputs.version }}.zip")
          # sign_update prints e.g.  sparkle:edSignature="…" length="…"
          SIG=$(echo "$OUTPUT" | sed -nE 's/.*sparkle:edSignature="([^"]+)".*/\1/p')
          LEN=$(echo "$OUTPUT" | sed -nE 's/.*length="([^"]+)".*/\1/p')
          echo "signature=$SIG" >> "$GITHUB_OUTPUT"
          echo "length=$LEN" >> "$GITHUB_OUTPUT"
          rm -f "$KEY_FILE"

      - name: Update appcast.xml
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ github.run_number }}
          SIG: ${{ steps.sign.outputs.signature }}
          LEN: ${{ steps.sign.outputs.length }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          ./Scripts/update-appcast.sh

      - name: Commit appcast back to default branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          DEFAULT_BRANCH="${GITHUB_REF_NAME}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes to commit"
          else
            git commit -m "chore(release): update appcast for ${{ steps.version.outputs.tag }}"
            git push origin HEAD:"$DEFAULT_BRANCH"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AgenticIDE ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            build/AgenticIDE-${{ steps.version.outputs.version }}.zip
